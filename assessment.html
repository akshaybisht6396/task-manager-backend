<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Task Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

  <nav class="bg-indigo-600 text-white shadow-md p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold tracking-wide">📌 Team Task Manager</h1>
    <button id="logoutBtn" onclick="logout()" class="hidden bg-indigo-700 hover:bg-indigo-800 px-4 py-2 rounded-lg text-sm font-medium transition duration-200">
      Logout
    </button>
  </nav>

  <main class="max-w-4xl mx-auto p-6 mt-6">

    <div id="authSection" class="grid md:grid-cols-2 gap-8 bg-white p-8 rounded-xl shadow-sm border border-slate-100">
      
      <div>
        <h2 class="text-2xl font-bold text-slate-700 mb-4">Register</h2>
        <form id="signupForm" onsubmit="handleSignup(event)" class="space-y-4">
          <input type="text" id="signupName" placeholder="Full Name" required class="w-full p-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <input type="email" id="signupEmail" placeholder="Email Address" required class="w-full p-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <input type="password" id="signupPassword" placeholder="Password" required class="w-full p-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <select id="signupRole" class="w-full p-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="ROLE_MEMBER">ROLE_MEMBER</option>
            <option value="ROLE_ADMIN">ROLE_ADMIN</option>
          </select>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded-lg font-semibold transition duration-200">
            Create Account
          </button>
        </form>
        <p id="signupMsg" class="mt-3 text-sm text-center font-medium"></p>
      </div>

      <div class="border-t md:border-t-0 md:border-l border-slate-100 pt-6 md:pt-0 md:pl-8">
        <h2 class="text-2xl font-bold text-slate-700 mb-4">Login</h2>
        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
          <input type="email" id="loginEmail" placeholder="Email Address" required class="w-full p-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <input type="password" id="loginPassword" placeholder="Password" required class="w-full p-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white p-3 rounded-lg font-semibold transition duration-200">
            Login
          </button>
        </form>
        <p id="loginMsg" class="mt-3 text-sm text-center font-medium"></p>
      </div>
    </div>

    <div id="dashboardSection" class="hidden space-y-6">
      <div class="flex justify-between items-center bg-white p-6 rounded-xl shadow-sm border border-slate-100">
        <div>
          <h2 class="text-3xl font-extrabold text-slate-800">Workspace Dashboard</h2>
          <p class="text-slate-500 text-sm mt-1">Manage team tasks and operational progress.</p>
        </div>
      </div>

      <div id="adminTaskPanel" class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hidden">
        <h3 class="text-xl font-bold text-slate-700 mb-4">➕ Add New Task</h3>
        <form id="taskForm" onsubmit="handleCreateTask(event)" class="grid md:grid-cols-3 gap-4">
          <input type="text" id="taskTitle" placeholder="Task Title" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500">
          <input type="text" id="taskDescription" placeholder="Description" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500">
          <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-6 py-3 rounded-lg transition duration-200">
            Save Task
          </button>
        </form>
        <p id="taskMsg" class="mt-2 text-sm"></p>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-bold text-slate-700">📋 Active Team Tasks</h3>
          <button onclick="fetchTasks()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-lg text-sm font-medium transition duration-200">
            🔄 Refresh
          </button>
        </div>
        <ul id="taskList" class="divide-y divide-slate-100 space-y-2">
          <li class="text-slate-400 py-4">No tasks found. Click Refresh or create one above!</li>
        </ul>
      </div>
    </div>

  </main>

  <script>
    // ⚠️ REPLACE THIS WITH YOUR LIVE RAILWAY LINK
    const BACKEND_URL = "https://task-manager-backend-production-16de.up.railway.app";
    let jwtToken = localStorage.getItem("jwtToken") || null;
    let userRole = localStorage.getItem("userRole") || "ROLE_MEMBER";

    // Startup configuration checks
    window.onload = function() {
      if (jwtToken) {
        showDashboard();
      }
    };

    function showDashboard() {
      document.getElementById("authSection").classList.add("hidden");
      document.getElementById("dashboardSection").classList.remove("hidden");
      document.getElementById("logoutBtn").classList.remove("hidden");

      // Only show the Create Task form if the user is an Admin
      if (userRole === "ROLE_ADMIN") {
        document.getElementById("adminTaskPanel").classList.remove("hidden");
      }
      fetchTasks();
    }

    function logout() {
      localStorage.clear();
      window.location.reload();
    }

    // AUTH: SIGNUP
    async function handleSignup(event) {
      event.preventDefault();
      const msg = document.getElementById("signupMsg");
      msg.className = "mt-3 text-sm text-center font-medium text-blue-600";
      msg.innerText = "Processing registration...";

      try {
        const response = await fetch(`${BACKEND_URL}/api/auth/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById("signupName").value,
            email: document.getElementById("signupEmail").value,
            password: document.getElementById("signupPassword").value,
            role: document.getElementById("signupRole").value
          })
        });

        if (response.ok) {
          msg.className = "mt-3 text-sm text-center font-medium text-emerald-600";
          msg.innerText = "Account created! You can log in now.";
          document.getElementById("signupForm").reset();
        } else {
          const err = await response.text();
          msg.className = "mt-3 text-sm text-center font-medium text-rose-600";
          msg.innerText = err || "Error signing up.";
        }
      } catch (error) {
        msg.className = "mt-3 text-sm text-center font-medium text-rose-600";
        msg.innerText = "Cannot connect to backend.";
      }
    }

    // AUTH: LOGIN
    async function handleLogin(event) {
      event.preventDefault();
      const msg = document.getElementById("loginMsg");
      msg.className = "mt-3 text-sm text-center font-medium text-blue-600";
      msg.innerText = "Logging in...";

      try {
        const response = await fetch(`${BACKEND_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById("loginEmail").value,
            password: document.getElementById("loginPassword").value
          })
        });

        if (response.ok) {
          const data = await response.json(); // Assumes token and role are returned
          jwtToken = data.token;
          userRole = data.role || "ROLE_MEMBER";

          localStorage.setItem("jwtToken", jwtToken);
          localStorage.setItem("userRole", userRole);

          msg.className = "mt-3 text-sm text-center font-medium text-emerald-600";
          msg.innerText = "Login Successful!";
          showDashboard();
        } else {
          msg.className = "mt-3 text-sm text-center font-medium text-rose-600";
          msg.innerText = "Invalid credentials.";
        }
      } catch (error) {
        msg.className = "mt-3 text-sm text-center font-medium text-rose-600";
        msg.innerText = "Connection failed.";
      }
    }

    // TASKS: FETCH ALL
    async function fetchTasks() {
      const taskList = document.getElementById("taskList");
      taskList.innerHTML = `<li class="text-slate-400 py-4">Fetching current tasks...</li>`;

      try {
        const response = await fetch(`${BACKEND_URL}/api/tasks`, {
          method: 'GET',
          headers: { 'Authorization': `Bearer ${jwtToken}` }
        });

        if (response.ok) {
          const tasks = await response.json();
          taskList.innerHTML = "";

          if (tasks.length === 0) {
            taskList.innerHTML = `<li class="text-slate-400 py-4">No tasks available yet.</li>`;
            return;
          }

          tasks.forEach(task => {
            const item = document.createElement("li");
            item.className = "py-4 flex justify-between items-center";
            item.innerHTML = `
              <div>
                <h4 class="font-bold text-slate-800">${task.title}</h4>
                <p class="text-slate-500 text-sm">${task.description || "No details provided"}</p>
              </div>
              <span class="px-3 py-1 bg-amber-100 text-amber-800 rounded-full text-xs font-bold">
                ${task.status || "PENDING"}
              </span>
            `;
            taskList.appendChild(item);
          });
        } else {
          taskList.innerHTML = `<li class="text-rose-500 py-4">Failed to load tasks.</li>`;
        }
      } catch (error) {
        taskList.innerHTML = `<li class="text-rose-500 py-4">Error loading tasks from cloud.</li>`;
      }
    }

    // TASKS: CREATE (ADMINS ONLY)
    async function handleCreateTask(event) {
      event.preventDefault();
      const msg = document.getElementById("taskMsg");

      try {
        const response = await fetch(`${BACKEND_URL}/api/tasks`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${jwtToken}`
          },
          body: JSON.stringify({
            title: document.getElementById("taskTitle").value,
            description: document.getElementById("taskDescription").value,
            status: "PENDING"
          })
        });

        if (response.ok) {
          msg.className = "mt-2 text-sm text-emerald-600";
          msg.innerText = "Task created successfully!";
          document.getElementById("taskForm").reset();
          fetchTasks();
        } else {
          msg.className = "mt-2 text-sm text-rose-600";
          msg.innerText = "Failed to create task.";
        }
      } catch (error) {
        msg.className = "mt-2 text-sm text-rose-600";
        msg.innerText = "Connection failed.";
      }
    }
  </script>
</body>
</html>
